                            <div className="overflow-x-auto pb-2">
                                <div className="min-w-[760px]" dir="ltr">
                                    <div className="flex pl-8 text-[10px] text-slate-500 select-none justify-between pr-4 mb-2 font-mono">
                                        <span>Jun 2026</span><span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span><span>Jan 2027</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span><span>Jul 2027</span>
                                    </div>
                                    <div className="flex gap-[3.5px]">
                                        <div className="flex flex-col justify-between text-[9px] text-slate-500 pr-2 w-8 select-none text-right h-[98px]">
                                            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
                                        </div>
                                        {heatmapGrid.map((week, wIdx) => (
                                            <div key={wIdx} className="flex flex-col gap-[3.5px]">
                                                {week.map((day, dIdx) => (
                                                    <div 
                                                        key={dIdx}
                                                        className={`w-[11px] h-[11px] rounded-[2.5px] transition-all duration-300 hover:scale-125 cursor-pointer ${getHeatmapColor(day.dateStr)}`}
                                                        title={`${day.dateStr} : ${tasks.filter(t => t.date === day.dateStr && t.status === 'Completed').length} مهام منجزة`}
                                                    />
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="flex justify-end items-center gap-1.5 mt-4 text-[10px] text-slate-500 select-none" dir="ltr">
                                <span>Less</span>
                                <div className="w-2.5 h-2.5 rounded-[2px] bg-white/[0.04]" />
                                <div className="w-2.5 h-2.5 rounded-[2px] bg-teal-900/40 border border-teal-500/20" />
                                <div className="w-2.5 h-2.5 rounded-[2px] bg-teal-700/60 border border-teal-400/30" />
                                <div className="w-2.5 h-2.5 rounded-[2px] bg-teal-500/70 border border-teal-300/40" />
                                <div className="w-2.5 h-2.5 rounded-[2px] bg-teal-400 border border-emerald-200" />
                                <span>More</span>
                            </div>
                        </div>

                        {/* --- بيئة العمل المقسمة (يمين: جدول المهام والـ Analytics، يسار: متعقب العادات والأدوات) --- */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                            
                            {/* القسم الأيمن (col-span-8): جدول المهام + الـ ANALYTICS PANEL الفخم */}
                            <div className="lg:col-span-8 space-y-6">
                                
                                {/* --- لوحة الـ ANALYTICS PANEL المحدثة بألوان متناسقة ومضيئة (Image 2 Redesigned) --- */}
                                <div className="bg-slate-900/35 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-[0_0_30px_rgba(20,184,166,0.05)] transition duration-300">
                                    <div className="flex items-center gap-2 mb-4 border-b border-white/10 pb-2">
                                        <span className="text-teal-400 text-lg">⚙️</span>
                                        <h2 className="text-xs uppercase font-mono font-bold tracking-widest text-slate-200">ANALYTICS PANEL</h2>
                                    </div>

                                    {/* بطاقات المؤشرات الأساسية بألوان وخطوط فخمة */}
                                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
                                        <div className="bg-slate-950/45 border border-white/5 p-3 rounded-xl hover:border-teal-500/20 transition">
                                            <p className="text-[8px] uppercase tracking-wider text-slate-400 mb-1 font-mono">TOTAL TASKS</p>
                                            <h4 className="text-2xl font-black text-teal-400 mono">{totalTasks}</h4>
                                        </div>
                                        <div className="bg-slate-950/45 border border-white/5 p-3 rounded-xl hover:border-emerald-500/20 transition">
                                            <p className="text-[8px] uppercase tracking-wider text-slate-400 mb-1 font-mono text-emerald-400">COMPLETED</p>
                                            <h4 className="text-2xl font-black text-emerald-400 mono">{completedTasks}</h4>
                                        </div>
                                        <div className="bg-slate-950/45 border border-white/5 p-3 rounded-xl hover:border-amber-500/20 transition">
                                            <p className="text-[8px] uppercase tracking-wider text-slate-400 mb-1 font-mono text-amber-400">PENDING</p>
                                            <h4 className="text-2xl font-black text-amber-400 mono">{activeAndPendingCount}</h4>
                                        </div>
                                        <div className="bg-slate-950/45 border border-white/5 p-3 rounded-xl hover:border-rose-500/20 transition">
                                            <p className="text-[8px] uppercase tracking-wider text-slate-400 mb-1 font-mono text-rose-400">CANCELLED</p>
                                            <h4 className="text-2xl font-black text-rose-400 mono">{cancelledTasks}</h4>
                                        </div>
                                        <div className="bg-slate-950/45 border border-white/5 p-3 rounded-xl hover:border-cyan-500/20 transition">
                                            <p className="text-[8px] uppercase tracking-wider text-slate-400 mb-1 font-mono text-cyan-400">EST. TIME</p>
                                            <h4 className="text-2xl font-black text-cyan-400 mono">{totalEstTimeHours}h</h4>
                                        </div>
                                        <div className="bg-slate-950/45 border border-white/5 p-3 rounded-xl hover:border-indigo-500/20 transition">
                                            <p className="text-[8px] uppercase tracking-wider text-slate-400 mb-1 font-mono text-indigo-400">ACTUAL TIME</p>
                                            <h4 className="text-2xl font-black text-indigo-400 mono">{totalActualHoursFloat}h</h4>
                                        </div>
                                    </div>

                                    {/* تفاصيل التحليل بالأسفل بتوزيع منظم وأشرطة ملونة */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        
                                        {/* دقة استهلاك الوقت */}
                                        <div className="space-y-4 bg-slate-950/35 p-4 rounded-2xl border border-white/5">
                                            <h5 className="text-[9px] uppercase tracking-wider text-slate-400 font-mono font-bold">TIME ANALYSIS</h5>
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center text-xs border-b border-white/5 pb-1.5">
                                                    <span className="text-slate-300 font-medium">Avg. Daily Hours</span>
                                                    <span className="mono font-bold text-white">{avgDailyHours}h</span>
                                                </div>
                                                <div className="flex justify-between items-center text-xs border-b border-white/5 pb-1.5">
                                                    <span className="text-slate-300 font-medium">Avg. Task Duration</span>
                                                    <span className="mono font-bold text-white">{avgTaskDurationMin} min</span>
                                                </div>
                                                <div className="flex justify-between items-center text-xs">
                                                    <span className="text-slate-300 font-medium">Est. vs Actual Diff</span>
                                                    <span className="mono font-bold text-white">{estVsActualDiffMin} min</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* المهام المنتهية حسب الفئة */}
                                        <div className="space-y-3 bg-slate-950/35 p-4 rounded-2xl border border-white/5">
                                            <h5 className="text-[9px] uppercase tracking-wider text-slate-400 font-mono font-bold">COMPLETED TASKS BY CATEGORY</h5>
                                            <div className="space-y-2.5">
                                                {categories.slice(0, 4).map((cat, i) => {
                                                    const total = tasks.filter(t => t.category === cat).length;
                                                    const completed = tasks.filter(t => t.category === cat && t.status === "Completed").length;
                                                    const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
                                                    return (
                                                        <div key={i} className="text-xs">
                                                            <div className="flex justify-between text-[10px] text-slate-400 font-mono mb-1">
                                                                <span>{cat}</span>
                                                                <span>{completed}/{total} ({percentage}%)</span>
                                                            </div>
                                                            <div className="w-full bg-white/[0.03] rounded-full h-1 overflow-hidden">
                                                                <div className="bg-gradient-to-r from-teal-400 to-cyan-500 h-full rounded-full transition-all duration-300" style={{ width: `${percentage}%` }} />
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* الساعات الكلية لكل فئة */}
                                        <div className="space-y-3 bg-slate-950/35 p-4 rounded-2xl border border-white/5">
                                            <h5 className="text-[9px] uppercase tracking-wider text-slate-400 font-mono font-bold">HOURS BY CATEGORY</h5>
                                            <div className="space-y-2.5">
                                                {categories.slice(0, 4).map((cat, i) => {
                                                    const catSeconds = tasks.filter(t => t.category === cat).reduce((sum, t) => sum + (t.actualTime || 0), 0);
                                                    const catHours = (catSeconds / 3600).toFixed(1);
                                                    const percentage = totalFocusSeconds > 0 ? Math.round((catSeconds / totalFocusSeconds) * 100) : 0;
                                                    return (
                                                        <div key={i} className="text-xs">
                                                            <div className="flex justify-between text-[10px] text-slate-400 font-mono mb-1">
                                                                <span>{cat}</span>
                                                                <span>{catHours} hrs ({percentage}%)</span>
                                                            </div>
                                                            <div className="w-full bg-white/[0.03] rounded-full h-1 overflow-hidden">
                                                                <div className="bg-gradient-to-r from-indigo-500 to-teal-400 h-full rounded-full transition-all duration-300" style={{ width: `${percentage}%` }} />
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                    </div>
                                </div>

                                {/* جدول المهام المسجلة الفعلي */}
                                <div className="bg-slate-900/35 backdrop-blur-md border border-white/10 rounded-3xl p-6 shadow-xl">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                                        <h2 className="text-xs uppercase font-bold tracking-wider text-white flex items-center gap-2">
                                            <span>📋</span> جدول المهام المسجلة
                                        </h2>
                                        
                                        <div className="flex gap-2 flex-wrap">
                                            <button onClick={handleExportData} className="bg-white/5 hover:bg-white/10 border border-white/10 text-[10px] font-bold px-3 py-1.5 rounded-xl transition">تصدير JSON</button>
                                            <label className="bg-white/5 hover:bg-white/10 border border-white/10 text-[10px] font-bold px-3 py-1.5 rounded-xl transition cursor-pointer">
                                                استيراد JSON
                                                <input type="file" onChange={handleImportData} className="hidden" accept=".json" />
                                            </label>
                                            <button onClick={() => confirm('هل تود إعادة تعيين كافة المهام؟') && setTasks([])} className="bg-rose-950/40 text-rose-400 border border-rose-500/25 hover:bg-rose-900/40 text-[10px] font-bold px-3 py-1.5 rounded-xl transition">مسح الكل</button>
                                        </div>
                                    </div>

                                    {/* الفلاتر والبحث */}
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-2 mb-6 bg-slate-950/45 p-3 rounded-2xl border border-white/5">
                                        <input 
                                            type="text"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            placeholder="البحث بالاسم..."
                                            className="w-full bg-white/5 border border-white/5 rounded-xl px-3 py-2 text-xs text-white placeholder-slate-600 focus:outline-none"
                                        />
                                        <select value={filterDate} onChange={(e) => setFilterDate(e.target.value)} className="bg-slate-900 border border-white/5 rounded-xl px-2 py-2 text-xs text-slate-300 focus:outline-none cursor-pointer">
                                            <option value="All">كل التواريخ</option>
                                            <option value="Today">اليوم ({getArabicDateLabel(liveTime)})</option>
                                            <option value="Yesterday">أمس ({getArabicDateLabel(yesterdayDate)})</option>
                                        </select>
                                        <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="bg-slate-900 border border-white/5 rounded-xl px-2 py-2 text-xs text-slate-300 focus:outline-none cursor-pointer">
                                            <option value="All Categories">كل التصنيفات</option>
                                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="bg-slate-900 border border-white/5 rounded-xl px-2 py-2 text-xs text-slate-300 focus:outline-none cursor-pointer">
                                            <option value="All Statuses">كل الحالات</option>
                                            <option value="Pending">قيد الانتظار</option>
                                            <option value="In Progress">جاري العمل</option>
                                            <option value="Completed">منتهية مكتملة</option>
                                            <option value="Cancelled">ملغاة/غير منجزة</option>
                                        </select>
                                        <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="bg-slate-900 border border-white/5 rounded-xl px-2 py-2 text-xs text-slate-300 focus:outline-none cursor-pointer">
                                            <option value="Newest First">الأحدث أولاً</option>
                                            <option value="Oldest First">الأقدم أولاً</option>
                                            <option value="Priority High-Low">الأولية من الأعلى</option>
                                            <option value="Est. Time High-Low">الأطول مدة أولاً</option>
                                        </select>
                                    </div>

                                    {/* جدول عرض البيانات المتجاوب */}
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-right border-collapse min-w-[650px]">
                                            <thead>
                                                <tr className="border-b border-white/5 text-[10px] uppercase font-bold text-slate-400 tracking-wider">
                                                    <th className="pb-3 pr-2">تفاصيل المهمة</th>
                                                    <th className="pb-3">التصنيف</th>
                                                    <th className="pb-3">التقديري</th>
                                                    <th className="pb-3">المنقضي</th>
                                                    <th className="pb-3">الأولوية</th>
                                                    <th className="pb-3">الحالة</th>
                                                    <th className="pb-3 text-left pl-2">التحكم</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {filteredTasks.map(task => {
                                                    const isActive = activeTaskId === task.id;
                                                    const isCompleted = task.status === 'Completed';
                                                    const isCancelled = task.status === 'Cancelled';
                                                    
                                                    let rowStyle = "text-xs hover:bg-white/[0.02] transition-all ";
                                                    if (isCompleted) {
                                                        rowStyle += "opacity-45 line-through bg-emerald-950/15 border-emerald-500/10 text-slate-400";
                                                    } else if (isCancelled) {
                                                        rowStyle += "bg-rose-950/20 border-rose-500/15 text-rose-300";
                                                    }

                                                    return (
                                                        <tr key={task.id} className={rowStyle}>
                                                            <td className="py-3.5 pr-2">
                                                                <div className="font-bold">{task.title}</div>
                                                                <div className="text-[9px] text-slate-400 flex items-center gap-2 mt-0.5">
                                                                    <span>📅 {task.date}</span>
                                                                    {task.notes && <span>• {task.notes}</span>}
                                                                </div>
                                                            </td>
                                                            <td>
                                                                <span className="px-2.5 py-0.5 rounded text-[9px] font-bold tracking-wider bg-indigo-950/40 text-indigo-300 border border-indigo-500/15">{task.category}</span>
                                                            </td>
                                                            <td className="mono text-slate-400 font-semibold">{task.estTime}m</td>
                                                            <td>
                                                                <span className={`mono font-bold ${isActive ? 'text-emerald-400 animate-pulse' : 'text-slate-500'}`}>
                                                                    {formatTime(task.actualTime || 0)}
                                                                </span>
                                                            </td>
                                                            <td>
                                                                <span className={`px-2 py-0.5 rounded text-[8px] font-bold tracking-wider ${
                                                                    task.priority === 'High' ? 'bg-rose-950/40 text-rose-400 border border-rose-500/15' : 'bg-slate-800 text-slate-400'
                                                                }`}>{task.priority === 'High' ? 'عالية' : 'عادية'}</span>
                                                            </td>
                                                            <td>
                                                                <select 
                                                                    value={task.status}
                                                                    onChange={(e) => {
                                                                        setTasks(tasks.map(t => t.id === task.id ? { ...t, status: e.target.value } : t));
                                                                        if (e.target.value !== 'In Progress' && activeTaskId === task.id) setActiveTaskId(null);
                                                                    }}
                                                                    className="bg-[#0c0d10] text-[10px] text-slate-300 font-semibold rounded border border-white/10 px-1 py-0.5 focus:outline-none cursor-pointer"
                                                                >
                                                                    <option value="Pending">قيد الانتظار</option>
                                                                    <option value="In Progress">جاري العمل</option>
                                                                    <option value="Completed">منتهية مكتملة</option>
                                                                    <option value="Cancelled">ملغاة/غير منجزة</option>
                                                                </select>
                                                            </td>
                                                            <td className="text-left pl-2">
                                                                <div className="flex items-center justify-end gap-1">
                                                                    {!isCompleted && !isCancelled && (
                                                                        <button 
                                                                            onClick={() => toggleTimer(task.id)} 
                                                                            className={`px-2.5 py-1 rounded text-[10px] font-bold transition-all ${isActive ? 'bg-amber-500 text-slate-950 font-black' : 'bg-white text-slate-950'}`}
                                                                        >
                                                                            {isActive ? '⏸ مؤقتاً' : '▶ بدء التركيز'}
                                                                        </button>
                                                                    )}
                                                                    <button onClick={() => setEditingTask({ ...task })} className="p-1 rounded bg-white/5 hover:bg-white/10 text-slate-300">📝</button>
                                                                    <button onClick={() => handleDuplicateTask(task)} className="p-1 rounded bg-white/5 hover:bg-white/10 text-slate-300">📁</button>
                                                                    <button onClick={() => handleDeleteTask(task.id)} className="p-1 rounded bg-white/5 hover:bg-rose-950/40 text-slate-300 hover:text-rose-400">✕</button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>

                            {/* القسم الأيسر (col-span-4): متعقب العادات اليومية (إصلاح الأيام السبعة بالكامل) والأدوات */}
                            <div className="lg:col-span-4 space-y-6">
                                
                                {/* متعقب العادات اليومية المصلح بالكامل (Image 1 Fixed) */}
                                <div className="bg-slate-900/35 backdrop-blur-md border border-white/10 rounded-3xl p-6 shadow-xl hover:border-white/20 transition duration-300">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xs uppercase font-bold text-white flex items-center gap-2">
                                            <span className="text-teal-400 text-lg">⚡</span> متعقب العادات اليومية
                                        </h2>
                                        
                                        <div className="flex items-center gap-1 bg-slate-950/80 px-2 py-1 rounded-xl border border-white/5">
                                            <span className="text-[8px] text-slate-400">البداية:</span>
                                            {/* هنا تم تعديل القائمة لتشمل كافة أيام الأسبوع السبعة بشكل متكامل */}
                                            <select 
                                                value={startOfWeek} 
                                                onChange={(e) => setStartOfWeek(e.target.value)}
                                                className="bg-transparent text-[8px] text-teal-400 font-bold focus:outline-none cursor-pointer"
                                            >
                                                <option value="Saturday" className="bg-slate-950 text-white">السبت</option>
                                                <option value="Sunday" className="bg-slate-950 text-white">الأحد</option>
                                                <option value="Monday" className="bg-slate-950 text-white">الاثنين</option>
                                                <option value="Tuesday" className="bg-slate-950 text-white">الثلاثاء</option>
                                                <option value="Wednesday" className="bg-slate-950 text-white">الأربعاء</option>
                                                <option value="Thursday" className="bg-slate-950 text-white">الخميس</option>
                                                <option value="Friday" className="bg-slate-950 text-white">الجمعة</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        {habits.map(h => {
                                            const { completedCount, percentage } = calculateHabitPercentageForWeek(h.completedDates, weekDays);
                                            return (
                                                <div key={h.id} className="bg-slate-950/40 border border-white/5 rounded-2xl p-4 relative hover:border-white/10 transition">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div>
                                                            <h4 className="text-xs font-bold text-slate-200">{h.name}</h4>
                                                            <p className="text-[9px] text-slate-400 mt-0.5">
                                                                {completedCount} من أصل 7 أيام متتالية ({percentage}%)
                                                            </p>
                                                        </div>
                                                        <button 
                                                            onClick={() => handleDeleteHabit(h.id)}
                                                            className="text-[9px] text-rose-400 font-semibold hover:underline"
                                                        >
                                                            حذف
                                                        </button>
                                                    </div>

                                                    {/* شبكة الأيام السبعة المصلحة للتوافق السلس والكامل للمظهر */}
                                                    <div className="grid grid-cols-7 gap-1 mt-3 w-full">
                                                        {weekDays.map((day, dIdx) => {
                                                            const isDone = h.completedDates && h.completedDates.includes(day.fullDate);
                                                            return (
                                                                <button
                                                                    key={dIdx}
                                                                    onClick={() => toggleHabitDay(h.id, day.fullDate)}
                                                                    className={`flex flex-col items-center justify-center p-1 rounded-xl transition-all min-w-0 h-12 border ${
                                                                        isDone 
                                                                        ? 'bg-gradient-to-b from-teal-400 to-cyan-500 text-slate-950 shadow-[0_0_12px_rgba(20,184,166,0.45)] scale-105 border-transparent font-black' 
                                                                        : 'bg-slate-900/60 text-slate-400 border border-white/5 hover:border-white/20'
                                                                    }`}
                                                                    title={`${day.nameShort} - ${day.fullDate}`}
                                                                >
                                                                    <span className="text-[8px] font-bold block truncate w-full text-center">{day.nameShort}</span>
                                                                    <span className="text-[11px] font-black block mt-0.5">{day.dayNum}</span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <form onSubmit={handleAddHabit} className="flex gap-2 mt-4">
                                        <input 
                                            type="text"
                                            required
                                            value={newHabitName}
                                            onChange={(e) => setNewHabitName(e.target.value)}
                                            placeholder="إضافة عادة جديدة..."
                                            className="flex-1 bg-slate-950/60 border border-white/10 rounded-xl px-3 py-2 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition"
                                        />
                                        <button 
                                            type="submit"
                                            className="w-8 h-8 rounded-xl bg-teal-500 text-slate-950 flex items-center justify-center font-bold text-sm hover:bg-teal-400 transition"
                                        >
                                            +
                                        </button>
                                    </form>
                                </div>

                                {/* الامتنان والمزاج اليومي */}
                                <div className="bg-slate-900/35 backdrop-blur-md border border-white/10 rounded-3xl p-6 shadow-xl hover:border-white/20 transition duration-300">
                                    <h2 className="text-sm font-bold text-white flex items-center gap-2 mb-4">
                                        <span className="text-teal-400 text-lg">🌿</span> مساحة الهدوء والامتنان
                                    </h2>

                                    <div className="mb-4">
                                        <p className="text-[10px] uppercase font-bold text-slate-300 mb-2">كيف تصف مزاجك الحالي؟</p>
                                        <div className="flex justify-between gap-1 bg-slate-950/40 p-2 rounded-2xl border border-white/5">
                                            {['😊', '😐', '😔', '⚡', '🍃'].map((emoji) => (
                                                <button
                                                    key={emoji}
                                                    onClick={() => setCurrentMood(emoji)}
                                                    className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg transition-all ${
                                                        currentMood === emoji 
                                                        ? 'bg-gradient-to-tr from-teal-500/20 to-indigo-500/20 border border-teal-500 shadow-[0_0_12px_rgba(20,184,166,0.35)] scale-110' 
                                                        : 'hover:bg-white/5'
                                                    }`}
                                                >
                                                    {emoji}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-slate-300 block mb-1">شيء تود شكر الله والامتنان لوجوده اليوم:</label>
                                        <textarea
                                            value={gratitudeText}
                                            onChange={(e) => setGratitudeText(e.target.value)}
                                            placeholder="كوب قهوة، تقدم بسيط بالبرمجة، يوم هادئ..."
                                            className="w-full bg-slate-950/60 border border-white/10 rounded-xl p-3 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition min-h-[90px] resize-none"
                                        />
                                    </div>
                                </div>

                                {/* إضافة مهمة تركيز جديدة */}
                                <div className="bg-slate-900/35 backdrop-blur-md border border-white/10 rounded-3xl p-6 shadow-xl">
                                    <h2 className="text-xs uppercase font-bold tracking-wider text-white flex items-center gap-2 mb-4">
                                        <span>📝</span> إضافة مهمة تركيز جديدة
                                    </h2>

                                    <form onSubmit={handleAddTask} className="space-y-3.5">
                                        <div>
                                            <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">اسم المهمة</label>
                                            <input 
                                                type="text"
                                                required
                                                value={formTitle}
                                                onChange={(e) => setFormTitle(e.target.value)}
                                                placeholder="مثلاً: مراجعة الكود، حل ثغرات الأمان..."
                                                className="w-full bg-slate-950/60 border border-white/10 rounded-xl px-3.5 py-2 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">ملاحظات إضافية</label>
                                            <input 
                                                type="text"
                                                value={formNotes}
                                                onChange={(e) => setFormNotes(e.target.value)}
                                                placeholder="أهداف فرعية للمهمة..."
                                                className="w-full bg-slate-950/60 border border-white/10 rounded-xl px-3.5 py-2 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 transition"
                                            />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <div className="flex justify-between items-center mb-1">
                                                    <label className="text-[9px] uppercase font-bold text-slate-400">التصنيف</label>
                                                    <button type="button" onClick={() => setShowCategoryModal(true)} className="text-[8px] text-teal-400 font-semibold hover:underline">تعديل</button>
                                                </div>
                                                <select 
                                                    value={formCategory}
                                                    onChange={(e) => setFormCategory(e.target.value)}
                                                    className="w-full bg-slate-950/60 border border-white/10 rounded-xl px-2 py-2 text-xs text-white focus:outline-none"
                                                >
                                                    {categories.map(c => <option key={c} value={c} className="bg-slate-900">{c}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">الوقت التقديري (دقيقة)</label>
                                                <input 
                                                    type="number"
                                                    value={formEstTime}
                                                    onChange={(e) => setFormEstTime(e.target.value)}
                                                    className="w-full bg-slate-950/60 border border-white/10 rounded-xl px-2 py-1.5 text-xs text-white focus:outline-none mono"
                                                />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">الأولية</label>
                                                <select 
                                                    value={formPriority}
                                                    onChange={(e) => setFormPriority(e.target.value)}
                                                    className="w-full bg-slate-950/60 border border-white/10 rounded-xl px-2 py-2 text-xs text-white focus:outline-none"
                                                >
                                                    <option value="Low" className="bg-slate-900">منخفضة</option>
                                                    <option value="Medium" className="bg-slate-900">متوسطة</option>
                                                    <option value="High" className="bg-slate-900">عالية 🔥</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">التاريخ</label>
                                                <input 
                                                    type="date"
                                                    value={formDate}
                                                    onChange={(e) => setFormDate(e.target.value)}
                                                    className="w-full bg-slate-950/60 border border-white/10 rounded-xl px-2 py-1.5 text-xs text-white focus:outline-none mono"
                                                />
                                            </div>
                                        </div>
                                        <button 
                                            type="submit"
                                            className="w-full bg-gradient-to-r from-teal-500 to-indigo-500 hover:from-teal-400 hover:to-indigo-400 text-slate-950 font-bold py-2.5 rounded-xl transition text-xs flex items-center justify-center gap-1 shadow-md"
                                        >
                                            + إضافة المهمة
                                        </button>
                                    </form>
                                </div>

                            </div>

                        </div>

                    </div>

                    {/* --- نافذة تعديل وإضافة التصنيفات --- */}
                    {showCategoryModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-md p-4">
                            <div className="bg-slate-950/95 border border-white/15 rounded-3xl w-full max-w-sm p-6 relative animate-fadeIn">
                                <button onClick={() => setShowCategoryModal(false)} className="absolute top-4 left-4 text-slate-400 hover:text-slate-100">✕</button>
                                <h3 className="text-xs font-bold uppercase tracking-wider text-white mb-4">إدارة وتعديل التصنيفات</h3>
                                <div className="flex gap-2 mb-4">
                                    <input 
                                        type="text"
                                        value={newCategoryName}
                                        onChange={(e) => setNewCategoryName(e.target.value)}
                                        placeholder="تصنيف جديد..."
                                        className="flex-1 bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none"
                                    />
                                    <button onClick={handleAddCategory} className="bg-teal-500 text-slate-950 hover:bg-teal-400 font-bold px-4 py-2 rounded-xl text-xs">إضافة</button>
                                </div>
                                <div className="space-y-1 max-h-40 overflow-y-auto">
                                    {categories.map(c => (
                                        <div key={c} className="flex justify-between items-center bg-white/[0.02] p-2 rounded-lg text-xs border border-white/5">
                                            <span>{c}</span>
                                            <button onClick={() => handleDeleteCategory(c)} className="text-slate-500 hover:text-rose-400">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- نافذة تعديل المهام الفردية --- */}
                    {editingTask && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-md p-4">
                            <div className="bg-slate-950/95 border border-white/15 rounded-3xl w-full max-w-md p-6 relative">
                                <button onClick={() => setEditingTask(null)} className="absolute top-4 left-4 text-slate-400 hover:text-slate-100">✕</button>
                                <h3 className="text-xs font-bold uppercase tracking-wider text-white mb-4">تعديل بيانات المهمة</h3>
                                <div className="space-y-3.5">
                                    <div>
                                        <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">اسم المهمة</label>
                                        <input type="text" value={editingTask.title} onChange={e => setEditingTask({ ...editingTask, title: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">ملاحظات</label>
                                        <input type="text" value={editingTask.notes} onChange={e => setEditingTask({ ...editingTask, notes: e.target.value })} className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">التصنيف</label>
                                            <select value={editingTask.category} onChange={e => setEditingTask({ ...editingTask, category: e.target.value })} className="w-full bg-slate-900 border border-white/10 rounded-xl px-2 py-2 text-xs text-white focus:outline-none">
                                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[9px] uppercase font-bold text-slate-400 block mb-1">الأولوية</label>
                                            <select value={editingTask.priority} onChange={e => setEditingTask({ ...editingTask, priority: e.target.value })} className="w-full bg-slate-900 border border-white/10 rounded-xl px-2 py-2 text-xs text-white focus:outline-none">
                                                <option value="Low">Low</option>
                                                <option value="Medium">Medium</option>
                                                <option value="High">High</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex justify-end gap-2 pt-2">
                                        <button onClick={() => setEditingTask(null)} className="bg-slate-800 text-slate-300 font-bold px-3 py-2 rounded-xl text-xs">إلغاء</button>
                                        <button onClick={handleSaveEdit} className="bg-white text-slate-950 hover:bg-slate-200 font-bold px-4 py-2 rounded-xl text-xs">حفظ التعديلات</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- حكمة الختام اليومية --- */}
                    <footer className="mt-8 text-center bg-slate-950/30 border border-white/10 rounded-2xl p-6 backdrop-blur-md">
                        <p className="text-[10px] text-teal-400 font-bold uppercase tracking-wider mb-1.5">💡 الحكمة اليومية المُلهمة</p>
                        <p className="text-xs text-slate-200 italic font-medium leading-relaxed">
                            "{getDailyWisdom()}"
                        </p>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```
