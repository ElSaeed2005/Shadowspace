        // ==========================================

        // ==========================================
        const formatDateToYMD = (dateObj) => {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const getArabicDateLabel = (dateObj) => {
            return dateObj.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long' });
        };

        // دالة حساب السبعة أيام متتالية بدقة بناء على خيار البداية المختار
        const getWeekDays = (startDayName, referenceDate) => {
            const daysOfWeekEN = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const startDayIdx = daysOfWeekEN.indexOf(startDayName);
            
            const refDayIdx = referenceDate.getDay();
            
            // حساب الفارق للوصول ليوم البداية الفعلي للأسبوع الحالي
            let diff = refDayIdx - startDayIdx;
            if (diff < 0) diff += 7;
            
            const startDate = new Date(referenceDate);
            startDate.setDate(referenceDate.getDate() - diff);
            
            const weekDays = [];
            const arDays = ["أحد", "اثنين", "ثلاثاء", "أربعاء", "خميس", "جمعة", "سبت"];
            
            for (let i = 0; i < 7; i++) {
                const d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
                weekDays.push({
                    nameShort: arDays[d.getDay()],
                    dateStr: `${d.getDate()}/${d.getMonth() + 1}`,
                    fullDate: formatDateToYMD(d),
                    dayNum: d.getDate()
                });
            }
            return weekDays;
        };

        // توليد الهيت ماب لسنة كاملة (يوليو 2026 حتي يوليو 2027)
        const generateHeatmapGrid = () => {
            const grid = [];
            let currentDay = new Date(2026, 5, 28); // الأحد الأخير من يونيو لموازنة الأعمدة
            const endDate = new Date(2027, 6, 4); // الأسبوع الأول من يوليو 2027
            while (currentDay <= endDate) {
                const week = [];
                for (let i = 0; i < 7; i++) {
                    const dateStr = formatDateToYMD(currentDay);
                    week.push({ dateStr });
                    currentDay.setDate(currentDay.getDate() + 1);
                }
                grid.push(week);
            }
            return grid;
        };

        const heatmapGrid = generateHeatmapGrid();

        // ==========================================
        //  مكون التطبيق الأساسي
        // ==========================================
        function App() {
            const [liveTime, setLiveTime] = useState(new Date());

            // حالات الخلفية (سواء الجاهزة الطبيعية أو المرفوعة يدوياً)

                return localStorage.getItem('shadow_bg_mode') || 'preset';
            });
            const [bgIndex, setBgIndex] = useState(() => {
                const saved = localStorage.getItem('shadow_bg_idx');
                return saved ? parseInt(saved, 10) : 0;
            });
            const [customBg, setCustomBg] = useState(() => {
                return localStorage.getItem('shadow_custom_bg') || '';
            });

            const [dimPanels, setDimPanels] = useState(false);
            
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('shadow_categories_v4');
                return saved ? JSON.parse(saved) : ["البرمجة", "الأمن السيبراني", "شهادة CC", "اللغة الإنجليزية", "تطوير الذات"];
            });

            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('shadow_tasks_v4');
                return saved ? JSON.parse(saved) : [

                        category: "البرمجة",
                        estTime: 60,
                        actualTime: 1800,

            const [activeTaskId, setActiveTaskId] = useState(null);

            // تشغيل الأصوات

            const audioCtxRef = useRef(null);

            // حقول النماذج
            const [formTitle, setFormTitle] = useState('');
            const [formNotes, setFormNotes] = useState('');
            const [formCategory, setFormCategory] = useState('البرمجة');

            // متعقب العادات
            const [startOfWeek, setStartOfWeek] = useState(() => {
                return localStorage.getItem('shadow_startofweek_v4') || 'Saturday';
            });
            const [habits, setHabits] = useState(() => {
                const saved = localStorage.getItem('shadow_habits_v4');

                    { id: 1, name: "شرب 3 لتر ماء", completedDates: [] },
                    { id: 2, name: "ممارسة البرمجة والمذاكرة", completedDates: [] },
                    { id: 3, name: "جلسة قراءة وتطوير ذات", completedDates: [] }
                ];
            });
            const [newHabitName, setNewHabitName] = useState('');

            // الامتنان والمزاج
            const [currentMood, setCurrentMood] = useState(() => {
                return localStorage.getItem('shadow_mood_v4') || '😊';
            });
            const [gratitudeText, setGratitudeText] = useState(() => {
                return localStorage.getItem('shadow_gratitude_v4') || '';
            });

            // الفلترة
            const [searchQuery, setSearchQuery] = useState('');
            const [filterDate, setFilterDate] = useState('All');
            const [filterCategory, setFilterCategory] = useState('All Categories');
            const [filterStatus, setFilterStatus] = useState('All Statuses');
            const [sortBy, setSortBy] = useState('Newest First');

            // النوافذ المنبثقة
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState('');
            const [editingTask, setEditingTask] = useState(null);

            // المزامنة مع التخزين المحلي
            useEffect(() => {
                localStorage.setItem('shadow_categories_v4', JSON.stringify(categories));
            }, [categories]);

            useEffect(() => {
                localStorage.setItem('shadow_tasks_v4', JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                localStorage.setItem('shadow_habits_v4', JSON.stringify(habits));
            }, [habits]);

            useEffect(() => {
                localStorage.setItem('shadow_startofweek_v4', startOfWeek);
            }, [startOfWeek]);

            useEffect(() => {

            }, [currentMood]);

            useEffect(() => {

            }, [gratitudeText]);

            useEffect(() => {
                localStorage.setItem('shadow_bg_idx', bgIndex);
                localStorage.setItem('shadow_bg_mode', bgMode);
            }, [bgIndex, bgMode]);

            // المؤقت الحركي للساعة
            useEffect(() => {
                const timer = setInterval(() => setLiveTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // تفعيل الخلفية الفورية
            useEffect(() => {
                if (bgMode === 'custom' && customBg) {
                    document.body.style.backgroundImage = `url('${customBg}')`;
                } else {
                    document.body.style.backgroundImage = `url('${SWISS_NATURE_BACKGROUNDS[bgIndex].url}')`;
                }
            }, [bgIndex, bgMode, customBg]);

            // تبديل الخلفية الجاهزة
            const handleBackgroundSwitch = () => {
                setBgMode('preset');
                setBgIndex((prev) => (prev + 1) % SWISS_NATURE_BACKGROUNDS.length);
            };

            // رفع خلفية مخصصة من الجهاز
            const handleCustomBgUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result;
                        try {
                            localStorage.setItem('shadow_custom_bg', base64String);
                            setCustomBg(base64String);
                            setBgMode('custom');
                        } catch (err) {
                            alert("تم تفعيل الخلفية المخصصة بنجاح لجلسة العمل الحالية!");
                            setCustomBg(base64String);
                            setBgMode('custom');
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };

            // طبقة التظليل والزجاج للموقع
            useEffect(() => {
                const overlay = document.getElementById('scenic-overlay');
                if (overlay) {
                    if (dimPanels) {
                        overlay.className = "fixed inset-0 -z-10 bg-slate-950/15 backdrop-blur-none transition-all duration-1000";
                    } else {
                        overlay.className = "fixed inset-0 -z-10 bg-gradient-to-br from-slate-950/45 via-slate-900/20 to-slate-950/50 backdrop-blur-[2px] transition-all duration-1000";
                    }
                }
            }, [dimPanels]);

            // عداد الوقت للمهمة النشطة
            useEffect(() => {
                let interval = null;
                if (activeTaskId !== null) {
                    interval = setInterval(() => {
                        setTasks(prev => prev.map(t => {
                            if (t.id === activeTaskId) {
                                return { ...t, actualTime: (t.actualTime || 0) + 1 };
                            }
                            return t;
                        }));
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [activeTaskId]);

            // محرك الأصوات المحيطية الطبيعية
            const startAmbient = (type, vol) => {
                stopAmbient();

                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxRef.current = ctx;

                    const mainGain = ctx.createGain();
                    mainGain.gain.setValueAtTime(vol * 0.5, ctx.currentTime);
                    mainGain.connect(ctx.destination);
                    gainNodeRef.current = mainGain;

                    const bufferSize = 2 * ctx.sampleRate;
                    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const output = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }

                    if (type === 'wind') {
                        const whiteNoise = ctx.createBufferSource();
                        whiteNoise.buffer = noiseBuffer;
                        whiteNoise.loop = true;

                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.Q.value = 3.0;
                        filter.frequency.setValueAtTime(320, ctx.currentTime);

                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 0.08; 
                        
                        const oscGain = ctx.createGain();
                        oscGain.gain.value = 160;

                        osc.connect(oscGain);
                        oscGain.connect(filter.frequency);
                        whiteNoise.connect(filter);
                        filter.connect(mainGain);

                        osc.start();
                        whiteNoise.start();
                    } else if (type === 'rain') {
                        const whiteNoise = ctx.createBufferSource();
                        whiteNoise.buffer = noiseBuffer;
                        whiteNoise.loop = true;

                        const filter = ctx.createBiquadFilter();
                        filter.type = 'bandpass';
                        filter.frequency.setValueAtTime(1000, ctx.currentTime);
                        filter.Q.value = 1.2;

                        whiteNoise.connect(filter);
                        filter.connect(mainGain);
                        whiteNoise.start();

                        const dropInterval = setInterval(() => {
                            if (audioCtxRef.current && audioCtxRef.current.state !== 'closed') {
                                try {
                                    const osc = audioCtxRef.current.createOscillator();
                                    const gain = audioCtxRef.current.createGain();
                                    osc.type = 'sine';
                                    osc.frequency.setValueAtTime(200 + Math.random() * 250, audioCtxRef.current.currentTime);
                                    osc.frequency.exponentialRampToValueAtTime(35, audioCtxRef.current.currentTime + 0.06);

                                    gain.gain.setValueAtTime(vol * 0.15, audioCtxRef.current.currentTime);
                                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.06);

                                    osc.connect(gain);
                                    gain.connect(audioCtxRef.current.destination);
                                    osc.start();
                                    osc.stop(audioCtxRef.current.currentTime + 0.07);
                                } catch(e){}
                            }
                        }, 220);
                        rainIntervalRef.current = dropInterval;
                    } else if (type === 'waves') {
                        const whiteNoise = ctx.createBufferSource();
                        whiteNoise.buffer = noiseBuffer;
                        whiteNoise.loop = true;

                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(180, ctx.currentTime);

                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = 0.06; 
                        
                        const oscGain = ctx.createGain();
                        oscGain.gain.value = 140;

                        osc.connect(oscGain);
                        oscGain.connect(filter.frequency);
                        whiteNoise.connect(filter);
                        filter.connect(mainGain);

                        osc.start();
                        whiteNoise.start();
                    } else if (type === 'cosmic') {
                        const osc1 = ctx.createOscillator();
                        const osc2 = ctx.createOscillator();
                        osc1.type = 'sawtooth';
                        osc2.type = 'sine';

                        osc1.frequency.setValueAtTime(90, ctx.currentTime); 
                        osc2.frequency.setValueAtTime(90.6, ctx.currentTime);

                        const filter = ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(120, ctx.currentTime);
                        filter.Q.value = 6.0;

                        const lfo = ctx.createOscillator();
                        lfo.frequency.value = 0.1;
                        const lfoGain = ctx.createGain();
                        lfoGain.gain.value = 40;

                        lfo.connect(lfoGain);
                        lfoGain.connect(filter.frequency);

                        osc1.connect(filter);
                        osc2.connect(filter);
                        filter.connect(mainGain);

                        lfo.start();
                        osc1.start();
                        osc2.start();
                    }

                    setAmbientPlaying(true);
                } catch(e) {
                    alert("برجاء النقر على أي مكان بالشاشة لتفعيل بث الأصوات بنجاح.");
                }
            };

            const stopAmbient = () => {
                if (rainIntervalRef.current) {
                    clearInterval(rainIntervalRef.current);
                }
                if (audioCtxRef.current) {
                    audioCtxRef.current.close();
                }
                setAmbientPlaying(false);
            };

            const toggleAmbient = () => {
                if (ambientPlaying) {
                    stopAmbient();
                } else {
                    startAmbient(ambientSound, ambientVolume);
                }
            };

            const handleVolumeChange = (newVolume) => {
                setAmbientVolume(newVolume);
                if (gainNodeRef.current && audioCtxRef.current) {
                    gainNodeRef.current.gain.setValueAtTime(newVolume * 0.5, audioCtxRef.current.currentTime);
                }
            };

            const handleSoundChange = (soundType) => {
                setAmbientSound(soundType);
                if (ambientPlaying) {
                    startAmbient(soundType, ambientVolume);
                }
            };

            // دوال استيراد وتصدير البيانات المدعومة بـ JSON لإنهاء المشكلة
            const handleExportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(
                    JSON.stringify({
                        tasks,
                        categories,
                        habits,
                        currentMood,
                        gratitudeText
                    }, null, 2)
                );
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `shadowspace_backup_${formatDateToYMD(new Date())}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            };

            const handleImportData = (e) => {
                const fileReader = new FileReader();
                if (e.target.files && e.target.files[0]) {
                    fileReader.readAsText(e.target.files[0], "UTF-8");
                    fileReader.onload = (event) => {
                        try {
                            const parsed = JSON.parse(event.target.result);
                            if (parsed.tasks) setTasks(parsed.tasks);
                            if (parsed.categories) setCategories(parsed.categories);
                            if (parsed.habits) setHabits(parsed.habits);
                            if (parsed.currentMood) setCurrentMood(parsed.currentMood);
                            if (parsed.gratitudeText) setGratitudeText(parsed.gratitudeText);
                            alert("تم استيراد البيانات بنجاح!");
                        } catch (err) {
                            alert("خطأ في قراءة ملف JSON أو تنسيقه غير صالح.");
                        }
                    };
                }
            };

            const todayStr = formatDateToYMD(liveTime);
            const yesterdayDate = new Date(liveTime);
            yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            const yesterdayStr = formatDateToYMD(yesterdayDate);

            // توليد السبعة أيام متتالية الحالية بناءً على اختيار يوم البداية
            const weekDays = getWeekDays(startOfWeek, liveTime);

            // إدارة العادات اليومية
            const handleAddHabit = (e) => {
                e.preventDefault();
                if (!newHabitName.trim()) return;
                const newHabit = {
                    id: Date.now(),
                    name: newHabitName.trim(),
                    completedDates: []
                };
                setHabits([...habits, newHabit]);
                setNewHabitName('');
            };

            const toggleHabitDay = (habitId, dateStr) => {
                setHabits(habits.map(h => {
                    if (h.id === habitId) {
                        const currentDates = h.completedDates ? [...h.completedDates] : [];
                        if (currentDates.includes(dateStr)) {
                            return { ...h, completedDates: currentDates.filter(d => d !== dateStr) };
                        } else {
                            return { ...h, completedDates: [...currentDates, dateStr] };
                        }
                    }
                    return h;
                }));
            };

            const handleDeleteHabit = (habitId) => {
                setHabits(habits.filter(h => h.id !== habitId));
            };

            const calculateHabitPercentageForWeek = (completedDates, weekDaysList) => {
                let count = 0;
                weekDaysList.forEach(wd => {
                    if (completedDates && completedDates.includes(wd.fullDate)) {
                        count++;
                    }
                });
                return {
                    completedCount: count,
                    percentage: Math.round((count / 7) * 100)
                };
            };

            // إدارة المهام
            const handleAddTask = (e) => {
                e.preventDefault();
                if (!formTitle.trim()) return;
                const newTask = {
                    id: Date.now(),
                    title: formTitle,
                    notes: formNotes,
                    category: formCategory,
                    estTime: Number(formEstTime) || 0,
                    actualTime: 0,
                    priority: formPriority,
                    status: 'Pending',
                    date: formDate
                };
                setTasks([newTask, ...tasks]);
                setFormTitle('');
                setFormNotes('');
                setFormEstTime('45');
            };

            const toggleTimer = (taskId) => {
                if (activeTaskId === taskId) {
                    setActiveTaskId(null);
                } else {
                    setTasks(tasks.map(t => t.id === taskId ? { ...t, status: 'In Progress' } : t));
                    setActiveTaskId(taskId);
                }
            };

            const handleCompleteTask = (taskId) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, status: 'Completed' } : t));
                if (activeTaskId === taskId) setActiveTaskId(null);
            };

            const handleCancelTask = (taskId) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, status: 'Cancelled' } : t));
                if (activeTaskId === taskId) setActiveTaskId(null);
            };

            const handleDeleteTask = (taskId) => {
                if (activeTaskId === taskId) setActiveTaskId(null);
                setTasks(tasks.filter(t => t.id !== taskId));
            };

            const handleDuplicateTask = (task) => {
                const duplicated = {
                    ...task,
                    id: Date.now(),
                    title: task.title + " (نسخة)",
                    actualTime: 0,
                    status: 'Pending'
                };
                setTasks([duplicated, ...tasks]);
            };

            const handleSaveEdit = () => {
                setTasks(tasks.map(t => t.id === editingTask.id ? editingTask : t));
                if (editingTask.status !== 'In Progress' && activeTaskId === editingTask.id) {
                    setActiveTaskId(null);
                }
                setEditingTask(null);
            };

            // تصنيفات مخصصة
            const handleAddCategory = () => {
                if (newCategoryName.trim() && !categories.includes(newCategoryName.trim())) {
                    setCategories([...categories, newCategoryName.trim()]);
                    setNewCategoryName('');
                }
            };

            const handleDeleteCategory = (catName) => {
                if (categories.length > 1) {
                    setCategories(categories.filter(c => c !== catName));
                    if (formCategory === catName) {
                        setFormCategory(categories.find(c => c !== catName));
                    }
                } else {
                    alert("يجب الإبقاء على تصنيف واحد على الأقل.");
                }
            };

            const formatTime = (totalSecs) => {
                const s = totalSecs % 60;
                const m = Math.floor(totalSecs / 60) % 60;
                const h = Math.floor(totalSecs / 3600);
                
                const sStr = s.toString().padStart(2, '0');
                const mStr = m.toString().padStart(2, '0');
                if (h > 0) {
                    return `${h.toString().padStart(2, '0')}:${mStr}:${sStr}`;
                }
                return `${mStr}:${sStr}`;
            };

            const getHeatmapColor = (dateStr) => {
                const completedOnDate = tasks.filter(t => t.date === dateStr && t.status === 'Completed').length;
                if (completedOnDate === 0) return 'bg-white/[0.03]';
                if (completedOnDate === 1) return 'bg-teal-950/40 border border-teal-500/20';
                if (completedOnDate === 2) return 'bg-teal-800/50 border border-teal-400/30';
                if (completedOnDate === 3) return 'bg-teal-500/70 border border-teal-300/40';
                return 'bg-teal-400 border border-emerald-200'; 
            };

            // حساب المؤشرات العامة والتحليلات
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.status === 'Completed').length;
            const pendingTasks = tasks.filter(t => t.status === 'Pending').length;
            const inProgressTasks = tasks.filter(t => t.status === 'In Progress').length;
            const activeAndPendingCount = pendingTasks + inProgressTasks;
            const cancelledTasks = tasks.filter(t => t.status === 'Cancelled').length;
            const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            const activeTask = tasks.find(t => t.id === activeTaskId);

            const totalFocusSeconds = tasks.reduce((sum, t) => sum + (t.actualTime || 0), 0);
            const totalFocusHours = Math.floor(totalFocusSeconds / 3600);
            const totalFocusMinutes = Math.floor((totalFocusSeconds % 3600) / 60);
            const totalActualHoursFloat = (totalFocusSeconds / 3600).toFixed(1);

            const totalEstTimeMinutes = tasks.reduce((sum, t) => sum + (Number(t.estTime) || 0), 0);
            const totalEstTimeHours = (totalEstTimeMinutes / 60).toFixed(0);

            const uniqueActiveDaysCount = [...new Set(tasks.map(t => t.date))].length || 1;
            const avgDailyHours = (totalFocusSeconds / 3600 / uniqueActiveDaysCount).toFixed(1);
            
            const avgTaskDurationMin = completedTasks > 0 
                ? Math.round((tasks.filter(t => t.status === 'Completed').reduce((sum, t) => sum + (t.actualTime || 0), 0) / 60) / completedTasks)
                : 0;
            const estVsActualDiffMin = Math.abs(totalEstTimeMinutes - Math.round(totalFocusSeconds / 60));

            const filteredTasks = tasks.filter(t => {
                const matchesSearch = t.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      t.notes.toLowerCase().includes(searchQuery.toLowerCase());
                
                let matchesDate = true;
                if (filterDate === 'Today') {
                    matchesDate = t.date === todayStr;
                } else if (filterDate === 'Yesterday') {
                    matchesDate = t.date === yesterdayStr;
                }

                const matchesCat = filterCategory === 'All Categories' || t.category === filterCategory;
                const matchesStatus = filterStatus === 'All Statuses' || t.status === filterStatus;

                return matchesSearch && matchesDate && matchesCat && matchesStatus;
            }).sort((a, b) => {
                if (sortBy === 'Newest First') return b.id - a.id;
                if (sortBy === 'Oldest First') return a.id - b.id;
                if (sortBy === 'Priority High-Low') {
                    const priorityWeight = { 'High': 3, 'Medium': 2, 'Low': 1 };
                    return priorityWeight[b.priority] - priorityWeight[a.priority];
                }
                if (sortBy === 'Est. Time High-Low') return b.estTime - a.estTime;
                return 0;
            });

            const getDailyWisdom = () => {
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 0);
                const diff = now - start;
                const oneDay = 1000 * 60 * 60 * 24;
                const dayOfYear = Math.floor(diff / oneDay);
                
                const arabicWisdoms = [
                    "التركيز الهادئ وسط الطبيعة هو البوابة السرية لكل إنجاز عظيم.",
                    "الخطوات الهادئة والمستمرة تصنع فارقاً أعمق من السرعة العشوائية.",
                    "العقل الصافي مثل بحيرة سويسرية ساكنة، يعكس الأفكار بوضوح تام.",
                    "الإنتاجية بوعي تعني الاستمتاع بكل دقيقة عمل وهدوء في آن واحد.",
                    "استقطع لحظة لتتأمل الطبيعة من حولك؛ فمنها يستلهم المبدعون أفكارهم."
                ];
                return arabicWisdoms[dayOfYear % arabicWisdoms.length];
            };

            return (
                <div className="max-w-[1400px] mx-auto px-4 py-6 relative">
                    
                    {/* --- شريط المؤقت العائم عند التفعيل --- */}

                            <div className="flex items-center gap-3">
                                <div className="relative w-10 h-10 rounded-xl bg-teal-500/10 border border-teal-500/20 flex items-center justify-center text-lg">

                                    <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-teal-400 rounded-full animate-ping"></span>
                                    <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-teal-400 rounded-full"></span>
                                </div>
                                <div>
                                    <div className="text-[9px] uppercase font-bold tracking-widest text-teal-400">التركيز الحالي على المهمة:</div>

                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="bg-black/95 px-5 py-2 rounded-xl border border-white/10 font-mono text-xl font-bold text-teal-400 tracking-widest shadow-[inset_0_0_12px_rgba(20,184,166,0.25)] min-w-[100px] text-center">
                                    {formatTime(activeTask.actualTime || 0)}
                                </div>

                                <div className="flex items-center gap-1.5">
                                    <button 
                                        onClick={() => toggleTimer(activeTaskId)}
                                        className="px-3.5 py-1.5 rounded-xl border border-amber-500/40 bg-amber-500/10 text-amber-300 text-xs font-bold hover:bg-amber-500/20 transition-all flex items-center gap-1"

                                    </button>
                                    <button 
                                        onClick={() => handleCompleteTask(activeTaskId)}

                                        onClick={() => handleCancelTask(activeTaskId)}

                            </div>

                                    title="تغيير الخلفية واختيار مشهد آخر من جبال سويسرا"
                                >

                                </button>

                                {/* زر رفع خلفية خاصة مخصصة من الجهاز */}

                                {/* زر تفعيل وضع التأمل والتركيز */}

                                        dimPanels 
                                        ? 'bg-amber-500/20 border-amber-500 text-amber-300'

                                    {dimPanels ? '👁 وضع التأمل نشط' : '👁 وضع التأمل'}
                                </button>

                            {/* الساعة والتاريخ الحى */}

                                <div className="text-2xl font-black tracking-wider text-white mono">

                    </header>

                    {/* المكونات الرئيسية التي تبهت في وضع التأمل لمشاهدة الطبيعة السويسرية */}

                        {/* --- لوحة القياس السريعة بالأعلى --- */}

                                <div>
                                    <p className="text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1">المهام المكتملة</p>
                                    <h3 className="text-3xl font-black text-emerald-400 tracking-tight">{completedTasks}</h3>

                            </div>

                            <div className="bg-slate-900/35 backdrop-blur-md border border-white/10 rounded-2xl p-4 flex justify-between items-center shadow-lg hover:border-amber-500/20 transition duration-300">
                                <div>
                                    <p className="text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1">قيد الانتظار</p>

                                <div className="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-400 border border-amber-500/20">⌛</div>
                            </div>

                                <div>

                                <div>
